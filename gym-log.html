<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GymLog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8f135;
    --accent2: #7b61ff;
    --text: #f0f0f5;
    --text-muted: #6b6b80;
    --red: #ff4d4d;
    --orange: #ff8c42;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }
  h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

  .app-header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
  .logo span { color: var(--accent); }
  .week-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .view { display: none; padding: 0 20px; }
  .view.active { display: block; }

  .today-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .today-hero::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: var(--accent);
    opacity: 0.07;
    border-radius: 50%;
  }
  .today-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .today-title { font-size: 38px; color: var(--accent); line-height: 1; margin-bottom: 8px; }
  .today-meta { font-size: 13px; color: var(--text-muted); }
  .today-meta strong { color: var(--text); }
  .start-btn {
    margin-top: 16px;
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .start-btn:active { transform: scale(0.97); }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 20px;
    text-align: center;
    transition: all 0.25s;
  }
  .drop-zone.active-drop {
    border-color: var(--accent);
    background: rgba(200,241,53,0.06);
  }
  .drop-zone-hint { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  .rest-emoji { font-size: 48px; margin-bottom: 12px; }

  .section-title { font-size: 20px; color: var(--text-muted); margin-bottom: 12px; }
  .next-days { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .next-day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .next-day-card.dragging {
    opacity: 0.35;
    transform: scale(0.97);
  }
  .next-day-card.drag-ghost {
    position: fixed;
    z-index: 300;
    pointer-events: none;
    opacity: 0.93;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transform: scale(1.03) rotate(1deg);
    transition: none !important;
    border-color: var(--accent);
  }
  .next-day-left { display: flex; flex-direction: column; }
  .next-day-when { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .next-day-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); }
  .next-day-type {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
  }
  .drag-handle { font-size: 20px; color: var(--text-muted); padding: 4px 6px; }

  .session-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 61px;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 99;
    border-bottom: 1px solid var(--border);
    margin: 0 -20px 16px;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--text);
    flex-shrink: 0;
  }
  .session-title { font-size: 28px; color: var(--accent); flex: 1; }
  .session-date { font-size: 12px; color: var(--text-muted); }
  .finish-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .exercise-cards { display: flex; flex-direction: column; gap: 12px; padding: 0 20px; }
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .ex-card.done { border-color: var(--accent); opacity: 0.75; }
  .ex-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .ex-num {
    width: 28px; height: 28px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    flex-shrink: 0; margin-right: 12px;
  }
  .ex-card.done .ex-num { background: var(--accent); color: #0a0a0f; }
  .ex-name { font-size: 15px; font-weight: 600; flex: 1; }
  .ex-last {
    font-size: 12px; color: var(--text-muted);
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px 8px;
  }
  .ex-last span { color: var(--accent); font-weight: 600; }
  .ex-body { padding: 0 16px 16px; display: none; }
  .ex-card.open .ex-body { display: block; }
  .ex-card.open .ex-header { border-bottom: 1px solid var(--border); }

  .sets-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .sets-table th { font-size: 11px; color: var(--text-muted); text-align: left; padding: 8px 0 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
  .sets-table td { padding: 6px 0; vertical-align: middle; }
  .set-num { font-size: 13px; color: var(--text-muted); width: 28px; }
  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 7px 10px;
    width: 80px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-ref { font-size: 12px; color: var(--text-muted); padding-left: 8px; }
  .set-ref strong { color: var(--accent2); }
  .add-set-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .done-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    padding: 10px;
    cursor: pointer;
  }
  .ex-card.done .done-btn { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }

  .history-list { display: flex; flex-direction: column; gap: 12px; padding: 8px 0; }
  .hist-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
  }
  .hist-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hist-left { display: flex; flex-direction: column; }
  .hist-type { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); }
  .hist-date { font-size: 12px; color: var(--text-muted); }
  .hist-badge {
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 10px;
    color: var(--text-muted);
  }
  .hist-exercises { padding: 0 16px 14px; display: none; }
  .hist-card.open .hist-exercises { display: block; }
  .hist-card.open .hist-header { border-bottom: 1px solid var(--border); }
  .hist-ex-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .hist-ex-row:last-child { border-bottom: none; }
  .hist-ex-name { color: var(--text); }
  .hist-ex-stats { color: var(--text-muted); font-size: 12px; }
  .hist-ex-stats strong { color: var(--accent); }
  .hist-actions {
    display: flex;
    gap: 8px;
    padding: 12px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .hist-action-btn {
    flex: 1; padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .hist-action-btn.edit { background: var(--surface2); color: var(--accent2); border-color: rgba(123,97,255,0.3); }
  .hist-action-btn.delete { background: var(--surface2); color: var(--red); border-color: rgba(255,77,77,0.3); }

  .plan-week { margin-bottom: 24px; }
  .plan-week-title {
    font-size: 22px; color: var(--text-muted);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .plan-week-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .plan-days { display: flex; flex-direction: column; gap: 8px; }
  .plan-day { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .plan-day-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .plan-day-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
  .plan-day-type { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 8px; }
  .type-legs { background: rgba(255,77,77,0.15); color: var(--red); border: 1px solid rgba(255,77,77,0.3); }
  .type-push { background: rgba(123,97,255,0.15); color: var(--accent2); border: 1px solid rgba(123,97,255,0.3); }
  .type-pull { background: rgba(255,140,66,0.15); color: var(--orange); border: 1px solid rgba(255,140,66,0.3); }
  .plan-day-exercises { padding: 0 16px 12px; display: none; }
  .plan-day.open .plan-day-exercises { display: block; }
  .plan-day.open .plan-day-header { border-bottom: 1px solid var(--border); }
  .plan-ex-item { padding: 5px 0; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .plan-ex-item::before { content: ''; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 500;
    display: flex; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px;
    margin: 0 auto; max-height: 85vh; overflow-y: auto; padding: 20px;
  }
  .modal-title { font-size: 28px; color: var(--accent); margin-bottom: 4px; }
  .modal-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-ex { margin-bottom: 20px; }
  .modal-ex-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .modal-set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .modal-set-num { font-size: 12px; color: var(--text-muted); width: 20px; flex-shrink: 0; }
  .modal-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    padding: 7px 10px; width: 80px; text-align: center; outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-del-set { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .modal-add-set {
    background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 6px; cursor: pointer; width: 100%; margin-top: 4px;
  }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; padding-bottom: 10px; }
  .modal-cancel {
    flex: 1; padding: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .modal-save {
    flex: 2; padding: 13px;
    background: var(--accent); border: none;
    border-radius: 12px; color: #0a0a0f;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; cursor: pointer;
  }

  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
    width: 100%; max-width: 340px; text-align: center;
  }
  .confirm-icon { font-size: 40px; margin-bottom: 12px; }
  .confirm-title { font-size: 22px; margin-bottom: 8px; }
  .confirm-text { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-cancel {
    flex: 1; padding: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .confirm-delete {
    flex: 1; padding: 12px;
    background: var(--red); border: none;
    border-radius: 12px; color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0a0a0f;
    font-weight: 700; font-size: 14px;
    padding: 10px 20px; border-radius: 20px;
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(13,13,20,0.96); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; padding: 10px 20px 20px; gap: 6px; z-index: 200;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
    cursor: pointer; padding: 8px 4px; border-radius: 12px; transition: all 0.2s;
  }
  .nav-btn.active { color: var(--accent); background: rgba(200,241,53,0.08); }
  .nav-icon { font-size: 22px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">GYM<span>LOG</span></div>
  <div class="week-badge" id="weekBadge">Týden 1</div>
</div>

<div class="view active" id="view-today">
  <div style="padding-top:16px;" id="todayContent"></div>
</div>
<div class="view" id="view-session"></div>
<div class="view" id="view-history">
  <div style="padding-top:16px;">
    <div class="section-title">HISTORIE TRÉNINKŮ</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
<div class="view" id="view-plan">
  <div style="padding-top:16px;" id="planContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showView('today',this)"><span class="nav-icon">⚡</span>Dnes</button>
  <button class="nav-btn" onclick="showView('history',this)"><span class="nav-icon">📋</span>Historie</button>
  <button class="nav-btn" onclick="showView('plan',this)"><span class="nav-icon">📅</span>Plán</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const EXERCISES = {
  LEGS: ['Dřep','Legpress','Zakopávání v leže','Zakopávání v sedě','Výpony na lýtka','Pallofpress'],
  PUSH: ['Incline benchpress','Tlaky s jednoručkami v sedě','Kliky na bradlech','Upažování s jednoručkami','Tricepsové stahování kladky','Cable crunches'],
  PULL: ['Shyby','Chest supported row','Pullover','Facepulls','Barbell curl','Mrtvý tah','Hanging knee raises']
};

const CYCLE = [
  { day: 0, dow: 1, type: 'LEGS', label: 'Pondělí' },
  { day: 1, dow: 2, type: 'PUSH', label: 'Úterý' },
  { day: 2, dow: 5, type: 'PULL', label: 'Pátek' },
  { day: 3, dow: 0, type: 'LEGS', label: 'Neděle' },
  { day: 4, dow: 3, type: 'PUSH', label: 'Středa' },
  { day: 5, dow: 4, type: 'PULL', label: 'Čtvrtek' },
];

function saveData(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function loadData(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

let history = loadData('gymlog_history', []);
let cycleStart = loadData('gymlog_cycleStart', null);

if (!cycleStart) {
  const now = new Date();
  const diff = (now.getDay() === 0 ? 6 : now.getDay() - 1);
  const mon = new Date(now);
  mon.setDate(now.getDate() - diff);
  mon.setHours(0,0,0,0);
  cycleStart = mon.toISOString();
  saveData('gymlog_cycleStart', cycleStart);
}

function getDateStr(d) { return d.toISOString().split('T')[0]; }

function getTodayInfo() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(cycleStart);
  const diffDays = Math.floor((today - start) / 86400000);
  const weekNum = Math.floor(diffDays / 7) % 2;
  const dow = today.getDay();
  const todayWorkout = CYCLE.find(c => {
    if (weekNum === 0 && c.day < 4 && c.dow === dow) return true;
    if (weekNum === 1 && c.day >= 4 && c.dow === dow) return true;
    return false;
  });
  return { today, weekNum, todayWorkout };
}

function getLastWorkout(type) {
  return history.filter(h => h.type === type).sort((a,b) => b.date.localeCompare(a.date))[0] || null;
}

function getLastWeightForExercise(type, exName) {
  const last = getLastWorkout(type);
  if (!last) return null;
  const ex = last.exercises.find(e => e.name === exName);
  if (!ex || !ex.sets || !ex.sets.length) return null;
  return ex.sets.reduce((a,b) => (parseFloat(b.weight)||0) > (parseFloat(a.weight)||0) ? b : a, ex.sets[0]);
}

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'history') renderHistory();
  if (name === 'plan') renderPlan();
}

// ============================================================
// TODAY
// ============================================================
function renderToday() {
  const { today, weekNum, todayWorkout } = getTodayInfo();
  document.getElementById('weekBadge').textContent = weekNum === 0 ? 'Dlouhý týden' : 'Krátký týden';
  const dateStr = today.toLocaleDateString('cs-CZ', { weekday:'long', day:'numeric', month:'long' });
  const container = document.getElementById('todayContent');
  let html = '';

  if (todayWorkout) {
    const last = getLastWorkout(todayWorkout.type);
    const lastDate = last ? new Date(last.date).toLocaleDateString('cs-CZ',{day:'numeric',month:'short'}) : 'Poprvé!';
    html += `
      <div class="today-hero">
        <div class="today-label">Dnešní trénink</div>
        <div class="today-title">${todayWorkout.type}</div>
        <div class="today-meta">${dateStr}</div>
        <div class="today-meta" style="margin-top:4px">Naposledy: <strong>${lastDate}</strong> &nbsp;|&nbsp; ${EXERCISES[todayWorkout.type].length} cviků</div>
        <button class="start-btn" onclick="startSession('${todayWorkout.type}','${getDateStr(today)}')">▶ SPUSTIT TRÉNINK</button>
      </div>`;
  } else {
    html += `
      <div class="drop-zone" id="dropZone">
        <div class="rest-emoji">😴</div>
        <h2 style="font-size:32px;color:var(--text-muted);margin-bottom:4px;">DEN ODPOČINKU</h2>
        <p style="font-size:14px;color:var(--text-muted);">${dateStr}</p>
        <div class="drop-zone-hint">⬆ Přetáhni trénink sem pro cvičení dnes</div>
      </div>`;
  }

  html += `<div class="section-title">NADCHÁZEJÍCÍ</div><div class="next-days" id="nextDaysList">`;
  const upcoming = getUpcomingWorkouts(today, 4);
  upcoming.forEach((u, idx) => {
    html += `
      <div class="next-day-card" id="upcoming-${idx}" data-type="${u.type}" data-date="${u.dateStr}">
        <div class="next-day-left">
          <div class="next-day-when">${u.whenLabel}</div>
          <div class="next-day-name">${u.label} — ${u.type}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="next-day-type">${u.type}</div>
          ${!todayWorkout ? '<span class="drag-handle">⠿</span>' : ''}
        </div>
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;

  if (!todayWorkout) setupDragDrop(today);
}

function getUpcomingWorkouts(fromDate, count) {
  const start = new Date(cycleStart);
  const results = [];
  const d = new Date(fromDate);
  d.setDate(d.getDate() + 1);
  for (let i = 0; i < 30 && results.length < count; i++) {
    const diffDays = Math.floor((d - start) / 86400000);
    const weekNum = Math.floor(diffDays / 7) % 2;
    const dow = d.getDay();
    const workout = CYCLE.find(c => {
      if (weekNum === 0 && c.day < 4 && c.dow === dow) return true;
      if (weekNum === 1 && c.day >= 4 && c.dow === dow) return true;
      return false;
    });
    if (workout) {
      const diff = Math.floor((d - fromDate) / 86400000);
      let whenLabel = diff === 1 ? 'Zítra' : d.toLocaleDateString('cs-CZ',{weekday:'long'});
      results.push({ ...workout, dateStr: getDateStr(d), whenLabel });
    }
    d.setDate(d.getDate() + 1);
  }
  return results;
}

// ============================================================
// DRAG & DROP
// ============================================================
function setupDragDrop(today) {
  const dropZone = document.getElementById('dropZone');
  if (!dropZone) return;

  let ghost = null;
  let dragging = null;
  let dragType = null;
  let dragDate = null;
  let offsetX = 0, offsetY = 0;

  document.querySelectorAll('.next-day-card').forEach(card => {
    card.addEventListener('touchstart', onTouchStart, { passive: true });
    card.addEventListener('mousedown', onMouseDown);
  });

  function initDrag(card, clientX, clientY) {
    dragging = card;
    dragType = card.dataset.type;
    dragDate = card.dataset.date;
    const rect = card.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    ghost = card.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.width = rect.width + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);
    setTimeout(() => { if (dragging) dragging.classList.add('dragging'); }, 0);
  }

  function moveGhost(clientX, clientY) {
    if (!ghost) return;
    ghost.style.left = (clientX - offsetX) + 'px';
    ghost.style.top = (clientY - offsetY) + 'px';
    const dz = dropZone.getBoundingClientRect();
    if (clientY < dz.bottom && clientY > dz.top && clientX > dz.left && clientX < dz.right) {
      dropZone.classList.add('active-drop');
    } else {
      dropZone.classList.remove('active-drop');
    }
  }

  function endDrag(clientX, clientY) {
    if (!ghost || !dragging) return;
    const dz = dropZone.getBoundingClientRect();
    const dropped = clientY < dz.bottom && clientY > dz.top && clientX > dz.left && clientX < dz.right;

    ghost.remove(); ghost = null;
    dragging.classList.remove('dragging');
    dropZone.classList.remove('active-drop');

    // Save drag info before clearing
    const droppedType = dragType;
    const droppedOrigDate = dragDate;
    dragging = null; dragType = null; dragDate = null;

    if (dropped) dropWorkoutToToday(droppedType, getDateStr(today), droppedOrigDate);

    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }

  function onTouchStart(e) {
    const t = e.touches[0];
    initDrag(this, t.clientX, t.clientY);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }
  function onMouseDown(e) {
    initDrag(this, e.clientX, e.clientY);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }
  function onTouchMove(e) { e.preventDefault(); const t = e.touches[0]; moveGhost(t.clientX, t.clientY); }
  function onMouseMove(e) { moveGhost(e.clientX, e.clientY); }
  function onTouchEnd(e) { const t = e.changedTouches[0]; endDrag(t.clientX, t.clientY); }
  function onMouseUp(e) { endDrag(e.clientX, e.clientY); }
}

function dropWorkoutToToday(type, todayDateStr, originalDate) {
  const dropZone = document.getElementById('dropZone');
  if (dropZone) {
    dropZone.style.transition = 'all 0.3s';
    dropZone.style.borderColor = 'var(--accent)';
    dropZone.style.background = 'rgba(200,241,53,0.1)';
  }
  setTimeout(() => {
    const last = getLastWorkout(type);
    const lastDate = last ? new Date(last.date).toLocaleDateString('cs-CZ',{day:'numeric',month:'short'}) : 'Poprvé!';
    const todayD = new Date(todayDateStr + 'T12:00:00');
    const dateStr = todayD.toLocaleDateString('cs-CZ', { weekday:'long', day:'numeric', month:'long' });

    const heroHtml = `
      <div class="today-hero" style="animation: fadeIn 0.3s ease">
        <div class="today-label">Dnešní trénink <span style="font-size:11px;background:rgba(200,241,53,0.15);border-radius:6px;padding:2px 8px;margin-left:6px;color:var(--accent)">Přesunuto</span></div>
        <div class="today-title">${type}</div>
        <div class="today-meta">${dateStr}</div>
        <div class="today-meta" style="margin-top:4px">Naposledy: <strong>${lastDate}</strong> &nbsp;|&nbsp; ${EXERCISES[type].length} cviků</div>
        <button class="start-btn" onclick="startSession('${type}','${todayDateStr}')">▶ SPUSTIT TRÉNINK</button>
      </div>`;

    const dz = document.getElementById('dropZone');
    if (dz) dz.outerHTML = heroHtml;

    // Remove ONLY the specific dragged card – match by type AND original date
    let removed = false;
    document.querySelectorAll('.next-day-card').forEach(card => {
      if (!removed && card.dataset.type === type && card.dataset.date === originalDate) {
        removed = true;
        card.style.transition = 'all 0.3s';
        card.style.opacity = '0';
        card.style.transform = 'translateY(-10px)';
        setTimeout(() => card.remove(), 300);
      }
    });

    showToast(`${type} přesunuto na dnes! 💪`);
  }, 150);
}

// ============================================================
// SESSION
// ============================================================
let currentSession = null;

function startSession(type, dateStr) {
  currentSession = {
    type, dateStr,
    exercises: EXERCISES[type].map(name => ({ name, sets: [{ reps:'', weight:'' }], done: false, open: false }))
  };
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-session').classList.add('active');
  renderSession();
  window.scrollTo(0,0);
}

function renderSession() {
  const { type, dateStr, exercises } = currentSession;
  const dateLabel = new Date(dateStr+'T12:00:00').toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
  const doneCnt = exercises.filter(e => e.done).length;

  let html = `
    <div class="session-header">
      <div class="back-btn" onclick="backToToday()">←</div>
      <div style="flex:1">
        <div class="session-title">${type}</div>
        <div class="session-date">${dateLabel} · ${doneCnt}/${exercises.length} hotovo</div>
      </div>
      <button class="finish-btn" onclick="finishSession()">ULOŽIT</button>
    </div>
    <div class="exercise-cards">`;

  exercises.forEach((ex, idx) => {
    const lastSet = getLastWeightForExercise(type, ex.name);
    const lastInfo = lastSet ? `<span>${lastSet.weight}kg × ${lastSet.reps}</span>` : '<span style="color:var(--text-muted)">První!</span>';
    html += `
      <div class="ex-card ${ex.done?'done':''} ${ex.open?'open':''}" id="ex-${idx}">
        <div class="ex-header" onclick="toggleEx(${idx})">
          <div class="ex-num">${ex.done?'✓':idx+1}</div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-last">Naposledy: ${lastInfo}</div>
        </div>
        <div class="ex-body">
          <table class="sets-table">
            <thead><tr>
              <th style="width:28px">#</th><th>Váha (kg)</th><th>Opak.</th><th>Naposledy</th>
            </tr></thead>
            <tbody>`;
    ex.sets.forEach((set, si) => {
      const refW = lastSet ? lastSet.weight : '';
      const refR = lastSet ? lastSet.reps : '';
      html += `<tr>
        <td class="set-num">${si+1}</td>
        <td><input class="set-input" type="number" min="0" step="0.5" placeholder="kg" value="${set.weight}" oninput="updateSet(${idx},${si},'weight',this.value)"/></td>
        <td><input class="set-input" type="number" min="0" step="1" placeholder="reps" value="${set.reps}" oninput="updateSet(${idx},${si},'reps',this.value)"/></td>
        <td class="set-ref">${refW ? `<strong>${refW}×${refR}</strong>` : '—'}</td>
      </tr>`;
    });
    html += `</tbody></table>
          <button class="add-set-btn" onclick="addSet(${idx})">+ Přidat sérii</button>
          <button class="done-btn" onclick="markDone(${idx})">${ex.done?'✓ HOTOVO':'OZNAČIT JAKO HOTOVÉ'}</button>
        </div>
      </div>`;
  });
  html += `</div><div style="height:20px"></div>`;
  document.getElementById('view-session').innerHTML = html;
}

function toggleEx(idx) {
  currentSession.exercises[idx].open = !currentSession.exercises[idx].open;
  renderSession();
  setTimeout(() => document.getElementById(`ex-${idx}`).scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}
function updateSet(exIdx, setIdx, field, val) { currentSession.exercises[exIdx].sets[setIdx][field] = val; }
function addSet(exIdx) {
  currentSession.exercises[exIdx].sets.push({ reps:'', weight:'' });
  currentSession.exercises[exIdx].open = true;
  renderSession();
}
function markDone(exIdx) {
  currentSession.exercises[exIdx].done = !currentSession.exercises[exIdx].done;
  if (currentSession.exercises[exIdx].done) currentSession.exercises[exIdx].open = false;
  renderSession();
}
function finishSession() {
  const anyData = currentSession.exercises.some(e => e.sets.some(s => s.weight || s.reps));
  if (!anyData) { showToast('Zadej alespoň pár hodnot!'); return; }
  history.push({
    date: currentSession.dateStr,
    type: currentSession.type,
    exercises: currentSession.exercises.map(e => ({ name: e.name, sets: e.sets }))
  });
  saveData('gymlog_history', history);
  showToast('Trénink uložen! 💪');
  backToToday();
}
function backToToday() {
  currentSession = null;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-today').classList.add('active');
  document.querySelectorAll('.nav-btn')[0].classList.add('active');
  renderToday();
  window.scrollTo(0,0);
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🏋️</div><p>Zatím žádné tréninky.<br>Čas se pustit do toho!</p></div>`;
    return;
  }
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map((h, si) => {
    const origIdx = history.indexOf(h);
    const dateLabel = new Date(h.date+'T12:00:00').toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
    const exRows = h.exercises.map(e => {
      const bestSet = e.sets && e.sets.length ? e.sets.reduce((a,b) => (parseFloat(b.weight)||0) > (parseFloat(a.weight)||0) ? b : a, e.sets[0]) : null;
      const stat = bestSet && (bestSet.weight || bestSet.reps) ? `<strong>${bestSet.weight||'?'}kg</strong> × ${bestSet.reps||'?'}` : '—';
      return `<div class="hist-ex-row"><span class="hist-ex-name">${e.name}</span><span class="hist-ex-stats">${stat}</span></div>`;
    }).join('');
    return `
      <div class="hist-card" id="hist-${si}">
        <div class="hist-header" onclick="toggleHist(${si})">
          <div class="hist-left">
            <div class="hist-type">${h.type}</div>
            <div class="hist-date">${dateLabel}</div>
          </div>
          <div class="hist-badge">${h.exercises.length} cviků</div>
        </div>
        <div class="hist-exercises">
          ${exRows}
          <div class="hist-actions">
            <button class="hist-action-btn edit" onclick="openEditModal(${origIdx})">✏️ Upravit</button>
            <button class="hist-action-btn delete" onclick="confirmDelete(${origIdx})">🗑️ Smazat</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleHist(i) { document.getElementById('hist-'+i).classList.toggle('open'); }

// ============================================================
// EDIT MODAL
// ============================================================
let editIdx = null, editData = null;

function openEditModal(origIdx) {
  editIdx = origIdx;
  editData = JSON.parse(JSON.stringify(history[origIdx]));
  renderEditModal();
}
function renderEditModal() {
  const h = editData;
  const dateLabel = new Date(h.date+'T12:00:00').toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
  let exHtml = h.exercises.map((ex, ei) => {
    const setsHtml = ex.sets.map((set, si) => `
      <div class="modal-set-row">
        <span class="modal-set-num">${si+1}</span>
        <input class="modal-input" type="number" min="0" step="0.5" placeholder="kg" value="${set.weight}" oninput="updateEditSet(${ei},${si},'weight',this.value)"/>
        <input class="modal-input" type="number" min="0" step="1" placeholder="rep" value="${set.reps}" oninput="updateEditSet(${ei},${si},'reps',this.value)"/>
        <button class="modal-del-set" onclick="removeEditSet(${ei},${si})">×</button>
      </div>`).join('');
    return `<div class="modal-ex"><div class="modal-ex-name">${ex.name}</div>${setsHtml}<button class="modal-add-set" onclick="addEditSet(${ei})">+ série</button></div>`;
  }).join('');
  const html = `
    <div class="modal-overlay" onclick="closeEditModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">${h.type}</div>
        <div class="modal-subtitle">${dateLabel}</div>
        ${exHtml}
        <div class="modal-footer">
          <button class="modal-cancel" onclick="closeEditModal()">Zrušit</button>
          <button class="modal-save" onclick="saveEdit()">ULOŽIT</button>
        </div>
      </div>
    </div>`;
  const existing = document.getElementById('editModal');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'editModal'; div.innerHTML = html;
  document.body.appendChild(div);
}
function updateEditSet(ei, si, field, val) { editData.exercises[ei].sets[si][field] = val; }
function addEditSet(ei) { editData.exercises[ei].sets.push({ weight:'', reps:'' }); renderEditModal(); }
function removeEditSet(ei, si) {
  if (editData.exercises[ei].sets.length <= 1) return;
  editData.exercises[ei].sets.splice(si, 1); renderEditModal();
}
function saveEdit() {
  history[editIdx] = editData;
  saveData('gymlog_history', history);
  closeEditModal(); renderHistory();
  showToast('Trénink upraven! ✅');
}
function closeEditModal(e) {
  if (e && e.target !== document.querySelector('.modal-overlay')) return;
  const el = document.getElementById('editModal');
  if (el) el.remove();
  editIdx = null; editData = null;
}

// ============================================================
// DELETE
// ============================================================
function confirmDelete(origIdx) {
  const h = history[origIdx];
  const dateLabel = new Date(h.date+'T12:00:00').toLocaleDateString('cs-CZ',{day:'numeric',month:'long'});
  const html = `
    <div class="confirm-overlay" onclick="closeConfirm(event)">
      <div class="confirm-box" onclick="event.stopPropagation()">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-title">Smazat trénink?</div>
        <div class="confirm-text">${h.type} · ${dateLabel}<br>Tato akce nejde vrátit zpět.</div>
        <div class="confirm-btns">
          <button class="confirm-cancel" onclick="closeConfirm()">Zrušit</button>
          <button class="confirm-delete" onclick="deleteWorkout(${origIdx})">SMAZAT</button>
        </div>
      </div>
    </div>`;
  const existing = document.getElementById('confirmModal');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'confirmModal'; div.innerHTML = html;
  document.body.appendChild(div);
}
function deleteWorkout(origIdx) {
  history.splice(origIdx, 1);
  saveData('gymlog_history', history);
  closeConfirm(); renderHistory();
  showToast('Trénink smazán.');
}
function closeConfirm(e) {
  if (e && e.target !== document.querySelector('.confirm-overlay')) return;
  const el = document.getElementById('confirmModal');
  if (el) el.remove();
}

// ============================================================
// PLAN
// ============================================================
function renderPlan() {
  const week1Days = [
    { label:'Pondělí', type:'LEGS' }, { label:'Úterý', type:'PUSH' },
    { label:'Pátek', type:'PULL' }, { label:'Neděle', type:'LEGS' }
  ];
  const week2Days = [{ label:'Středa', type:'PUSH' }, { label:'Čtvrtek', type:'PULL' }];

  function dayCard(d, idx, wp) {
    const id = `pd-${wp}-${idx}`;
    const exItems = EXERCISES[d.type].map(ex => `<div class="plan-ex-item">${ex}</div>`).join('');
    return `
      <div class="plan-day" id="${id}">
        <div class="plan-day-header" onclick="togglePlanDay('${id}')">
          <span class="plan-day-name">${d.label}</span>
          <span class="plan-day-type type-${d.type.toLowerCase()}">${d.type}</span>
        </div>
        <div class="plan-day-exercises">${exItems}</div>
      </div>`;
  }

  document.getElementById('planContent').innerHTML = `
    <div class="plan-week">
      <div class="plan-week-title">DLOUHÝ TÝDEN</div>
      <div class="plan-days">${week1Days.map((d,i) => dayCard(d,i,'w1')).join('')}</div>
    </div>
    <div class="plan-week">
      <div class="plan-week-title">KRÁTKÝ TÝDEN</div>
      <div class="plan-days">${week2Days.map((d,i) => dayCard(d,i,'w2')).join('')}</div>
    </div>`;
}
function togglePlanDay(id) { document.getElementById(id).classList.toggle('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderToday();
renderPlan();
</script>
